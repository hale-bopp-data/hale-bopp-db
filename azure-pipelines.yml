# hale-bopp-db — CI Pipeline
# Deterministic schema governance engine: lint, test, GitHub mirror

trigger:
  branches:
    include:
      - main

pr:
  branches:
    include:
      - main

pool:
  name: Default

variables:
  - group: EasyWay-Secrets

stages:
  - stage: BuildAndTest
    displayName: 'Build, Lint & Test'
    jobs:
      - job: PythonTest
        displayName: 'Python Lint & Test'
        steps:
          - checkout: self

          - script: |
              set -e
              python3 --version
              python3 -m venv .venv
              source .venv/bin/activate
              pip install --upgrade pip
              pip install -e ".[dev,api]" 2>/dev/null || pip install -e .
              pip install pytest ruff
            displayName: 'Install dependencies'

          - script: |
              set -e
              source .venv/bin/activate
              ruff check app/ tests/ || echo "##[warning]Ruff lint issues found"
            displayName: 'Lint (Ruff)'
            continueOnError: true

          - script: |
              set -e
              source .venv/bin/activate
              python -m pytest tests/ -v --tb=short
            displayName: 'Test (pytest)'

  - stage: GitHubMirror
    displayName: 'GitHub Mirror (publish main → github)'
    dependsOn: BuildAndTest
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
    jobs:
      - job: MirrorToGitHub
        displayName: 'Push main → github.com/hale-bopp-data/hale-bopp-db'
        pool:
          name: Default
        steps:
          - checkout: self
            fetchDepth: 0

          - script: |
              set -e
              git remote add github https://$(GITHUB_PAT)@github.com/hale-bopp-data/hale-bopp-db.git 2>/dev/null || \
                git remote set-url github https://$(GITHUB_PAT)@github.com/hale-bopp-data/hale-bopp-db.git
              git push github HEAD:refs/heads/main --force
            displayName: 'Mirror to GitHub'
