name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: halebopp
          POSTGRES_PASSWORD: halebopp_test
          POSTGRES_DB: halebopp_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U halebopp"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package and test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[api,dev]"

      - name: Run tests
        env:
          DATABASE_URL: postgresql://halebopp:halebopp_test@localhost:5432/halebopp_test
        run: pytest tests/ -v
