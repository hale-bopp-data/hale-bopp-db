services:
  db-engine:
    build: .
    container_name: hale-bopp-db
    ports:
      - "8100:8100"
    environment:
      - PYTHONUNBUFFERED=1
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - hale-bopp

  postgres:
    image: postgres:16-alpine
    container_name: hale-bopp-postgres
    environment:
      POSTGRES_USER: halebopp
      POSTGRES_PASSWORD: halebopp_dev
      POSTGRES_DB: halebopp
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U halebopp"]
      interval: 5s
      timeout: 3s
      retries: 5
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - hale-bopp

volumes:
  pg_data:

networks:
  hale-bopp:
    driver: bridge
